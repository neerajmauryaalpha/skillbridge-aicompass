<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AICompass – AI Literacy Guide</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HERO SECTION -->
  <header class="hero">
    <h1>AICompass 🧭</h1>
    <p>A Conversational Guide to AI Literacy, Ethics & Risks</p>
    <button onclick="toggleChat()">Start Chatting</button>
  </header>

  <!-- FEATURES -->
  <section class="features">
    <div class="card">Understand AI Basics</div>
    <div class="card">Explore AI Ethics</div>
    <div class="card">Recognize AI Risks</div>
  </section>

  <!-- CHAT BUTTON -->
  <button class="chat-btn" onclick="toggleChat()">💬</button>

  <!-- CHAT POPUP -->
  <div class="chat-popup" id="chatPopup">
    <div class="chat-header">AICompass 🧭</div>
    <div class="chat-body" id="chatBody">
      <div class="bot">Hi! I’m AICompass. What would you like to learn?</div>
    </div>
    <div class="chat-options">
      <button onclick="send('What is AI?')">What is AI?</button>
      <button onclick="send('AI bias')">AI bias</button>
      <button onclick="send('AI ethics')">AI ethics</button>
      <button onclick="send('AI in daily life')">AI in daily life</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
